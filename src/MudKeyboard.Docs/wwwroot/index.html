<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================================================
         SEO / social / AI-crawler metadata.
         Replace every occurrence of "https://YOUR-DOMAIN" with the deployed origin
         (here and in robots.txt, sitemap.xml, llms.txt). If hosting under a sub-path
         (e.g. GitHub project pages), also change <base href="/"> below to match.
         ============================================================================ -->

    <title>MudKeyboard — Pure-Blazor on-screen virtual keyboard for MudBlazor</title>
    <meta name="description" content="MudKeyboard is a free, open-source on-screen virtual keyboard for Blazor and MudBlazor apps. JavaScript-free core, automatic MudBlazor theming, inline & global docked keyboards, numpad and pricepad, and AOT/trim-friendly. Targets .NET 8, 9 and 10." />
    <meta name="keywords" content="MudKeyboard, Blazor, MudBlazor, virtual keyboard, on-screen keyboard, touch keyboard, Blazor component, Blazor WebAssembly, Blazor Server, numpad, kiosk, .NET, C#, NuGet" />
    <meta name="author" content="Sardar" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="theme-color" content="#7C4DFF" />
    <meta name="color-scheme" content="light dark" />
    <meta name="generator" content="Blazor WebAssembly" />
    <link rel="canonical" href="https://YOUR-DOMAIN/" />

    <base href="/" />

    <!-- Icons / PWA -->
    <link rel="icon" type="image/svg+xml" href="_content/MudKeyboard/mudkeyboard_logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="manifest" href="site.webmanifest" />

    <meta property="og:site_name" content="MudKeyboard" />
    <meta property="og:title" content="MudKeyboard — Pure-Blazor on-screen keyboard for MudBlazor" />

    <meta property="og:image" content="https://YOUR-DOMAIN/og-image.png" />

        },
        {
          "@type": "Person",
          "@id": "https://YOUR-DOMAIN/#author",

          "url": "https://github.com/sardar97"
        },
        {

          "name": "MudKeyboard",
          "applicationCategory": "DeveloperApplication",

    <!-- Fonts + MudBlazor theme (MudKeyboard reads MudBlazor's CSS variables). -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />

    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/docs.css" />

    <!-- RCL scoped CSS bundle — includes MudKeyboardHost's slide-up animation. -->
    <link rel="stylesheet" href="MudKeyboard.Docs.styles.css" />

    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="app-loading">
            <img class="app-loading__logo" src="_content/MudKeyboard/mudkeyboard_logo.svg" alt="MudKeyboard" />
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

</html>
