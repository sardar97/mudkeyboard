name: Publish to NuGet

# Publishes the NuGet package — and creates a matching GitHub Release — whenever a version
# tag (v1.2.3, v0.1.0-alpha, …) is pushed. The tag string is the single source of truth for
# the released version.
#
# This is the ONLY thing that publishes the package. The docs website is deployed by a
# completely separate path (push to the `docs` branch → Cloudflare Pages); see RELEASE.md.
on:
  push:
    tags: ['v*']

# contents: write is needed so the workflow can create the GitHub Release.
# The NuGet push itself authenticates with the NUGET_API_KEY secret, not this token.
permissions:
  contents: write

jobs:
  publish:
    name: Pack & push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # Derive the package version from the tag so the tag is the single source of truth:
      # refs/tags/v0.1.0-alpha -> 0.1.0-alpha
      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build src/MudKeyboard/MudKeyboard.csproj --no-restore --configuration Release -p:Version=${{ steps.version.outputs.version }}

      # Quality gate: don't publish if the tests are red.
      - name: Test
        run: dotnet test tests/MudKeyboard.Tests/MudKeyboard.Tests.csproj --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack src/MudKeyboard/MudKeyboard.csproj --no-build --configuration Release -p:Version=${{ steps.version.outputs.version }} -o artifacts

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Pull the notes for this version out of CHANGELOG.md (the "## [1.2.3] — …" section,
      # up to the next version header or the link-reference block at the bottom of the file).
      - name: Extract release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && (/^## \[/ || /^\[[^]]+\]: /) { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION. See CHANGELOG.md for details." > release-notes.md
          fi

      # Create (or, on a re-run, update) the GitHub Release for this tag. Pre-release versions
      # (anything with a hyphen, e.g. 1.1.0-beta.1) are flagged as pre-release automatically.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE=""
          case "$VERSION" in *-*) PRERELEASE="--prerelease" ;; esac
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "v$VERSION" --notes-file release-notes.md $PRERELEASE
          fi
