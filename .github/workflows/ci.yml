name: CI

# Quality gate only: builds and tests the whole solution on every push/PR to master.
# It does NOT deploy or publish anything — the docs site deploys from the `docs` branch
# (Cloudflare Pages) and the NuGet package publishes from `v*` tags (publish.yml).
# See RELEASE.md for the release runbook.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The library multi-targets net8.0/net9.0/net10.0, so all three SDKs must be present.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      # Builds the library (with its trim/AOT analyzers via IsAotCompatible), the demos and the tests.
      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
